<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AI 科技股看板</title>
<style>
:root{
  --bg:#080b12;--card:#111827;--cardHover:#1a2332;--border:#1e293b;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --accent:#3b82f6;--accent2:#818cf8;--green:#10b981;--red:#ef4444;
  --yellow:#f59e0b;--orange:#f97316;--purple:#8b5cf6;
  --tag-ok:#064e3b;--tag-ok-t:#6ee7b7;
  --tag-warn:#78350f;--tag-warn-t:#fcd34d;
  --tag-no:#3b1c1c;--tag-no-t:#fca5a5;
  --radius:12px;--radius-sm:8px;--shadow:0 4px 24px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 20% 20%,rgba(59,130,246,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(139,92,246,.04) 0%,transparent 50%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;padding:16px;max-width:960px;margin:0 auto}
/* Header */
header{text-align:center;padding:24px 0 20px}
header h1{font-size:26px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header .sub{font-size:12px;color:var(--text3);margin-top:4px}
header .stats{display:flex;justify-content:center;gap:20px;margin-top:10px;flex-wrap:wrap}
header .stat-item{text-align:center}
header .stat-val{font-size:20px;font-weight:700;color:var(--accent2)}
header .stat-label{font-size:10px;color:var(--text3)}
/* Search */
.search-box{position:relative;margin-bottom:10px}
.search-box input{width:100%;padding:12px 16px 12px 40px;border-radius:24px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:14px;outline:none;transition:all .2s}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.search-box input::placeholder{color:var(--text3)}
.search-ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
/* Tags */
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tags::-webkit-scrollbar{display:none}
.tag{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;border:1.5px solid var(--border);color:var(--text2);background:var(--card);transition:all .2s;user-select:none}
.tag.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 12px rgba(59,130,246,.3)}
.tag:hover:not(.active){border-color:var(--accent);color:var(--text)}
/* Status bar */
.status-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:11px;color:var(--text3);flex-wrap:wrap;gap:4px}
.status-bar .count{color:var(--accent);font-weight:700}
/* Stock List */
.stock-list{display:flex;flex-direction:column;gap:6px}
.stock-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.stock-card:hover{border-color:var(--accent);background:var(--cardHover);transform:translateY(-1px);box-shadow:var(--shadow)}
.stock-card .row1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.stock-card .name{font-size:15px;font-weight:700}
.stock-card .code{font-size:10px;color:var(--text3);margin-left:5px;font-family:monospace}
.stock-card .price-area{text-align:right}
.stock-card .price{font-size:16px;font-weight:700}
.stock-card .change{font-size:12px;font-weight:600;padding:2px 6px;border-radius:4px}
.change.up{background:rgba(16,185,129,.1);color:var(--green)}
.change.down{background:rgba(239,68,68,.1);color:var(--red)}
.stock-card .row2{display:flex;flex-wrap:wrap;gap:4px;margin:4px 0}
.stock-card .concept-tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
.concept-tag.ok{background:var(--tag-ok);color:var(--tag-ok-t)}
.concept-tag.warn{background:var(--tag-warn);color:var(--tag-warn-t)}
.concept-tag.no{background:var(--tag-no);color:var(--tag-no-t)}
.stock-card .row3{font-size:11px;color:var(--text2);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.stock-card .cat-badge{font-size:9px;padding:2px 8px;border-radius:3px;background:rgba(59,130,246,.12);color:var(--accent);font-weight:600}
/* Detail Overlay */
.detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.detail-panel{background:linear-gradient(180deg,var(--bg),#0f1420);border-radius:20px 20px 0 0;width:100%;max-width:960px;max-height:90vh;overflow-y:auto;padding:24px 20px 48px;animation:slideUp .3s cubic-bezier(.16,1,.3,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.detail-panel::-webkit-scrollbar{width:4px}
.detail-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.close-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.stock-title{font-size:22px;font-weight:800}
.stock-sub{font-size:12px;color:var(--text2);margin-top:2px}
.close-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--card);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.close-btn:hover{background:var(--red);color:#fff}
.price-row{display:flex;gap:16px;align-items:baseline;margin-bottom:20px;flex-wrap:wrap}
.price-row .big-price{font-size:28px;font-weight:800}
.price-row .big-chg{font-size:16px;font-weight:700;padding:4px 10px;border-radius:6px}
/* Sections */
.detail-section{margin-bottom:18px}
.detail-section h3{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);font-weight:700}
.detail-section .info-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.03)}
.detail-section .info-row .label{color:var(--text2)}
.detail-section .info-row .val{font-weight:600}
/* Products */
.prod-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;margin:4px 0;background:rgba(255,255,255,.02);border-radius:var(--radius-sm);border-left:3px solid var(--border)}
.prod-item.mass{border-left-color:var(--green)}
.prod-item.rd{border-left-color:var(--yellow)}
.prod-item.ext{border-left-color:var(--red)}
.prod-item .prod-icon{font-size:14px;min-width:20px}
.prod-item .prod-info{flex:1}
.prod-item .prod-name{font-size:13px;font-weight:600}
.prod-item .prod-meta{font-size:11px;color:var(--text2);margin-top:1px}
.prod-item .prod-detail{font-size:11px;color:var(--text3);margin-top:2px}
/* Supply Chain */
.sc-flow{display:flex;align-items:center;gap:8px;font-size:11px;flex-wrap:wrap;padding:8px;background:rgba(255,255,255,.02);border-radius:var(--radius-sm)}
.sc-flow .sc-node{padding:6px 10px;border-radius:6px;font-weight:600}
.sc-node.up{background:rgba(139,92,246,.15);color:var(--purple)}
.sc-node.self{background:rgba(59,130,246,.15);color:var(--accent)}
.sc-node.down{background:rgba(16,185,129,.15);color:var(--green)}
.sc-arrow{color:var(--text3)}
/* Catalyst/Risk */
.cat-item,.risk-item{font-size:12px;padding:3px 0;line-height:1.6}
.cat-item::before{content:'+ ';color:var(--green);font-weight:700}
.risk-item::before{content:'- ';color:var(--red);font-weight:700}
.key-q{padding:10px 12px;background:rgba(59,130,246,.06);border-radius:var(--radius-sm);font-size:12px;color:var(--accent);border:1px solid rgba(59,130,246,.15);margin-top:8px}
/* News */
.news-item{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.news-item .news-title{font-size:13px;font-weight:600;margin-bottom:3px}
.news-item .news-meta{font-size:10px;color:var(--text3);margin-bottom:4px}
.news-item .news-interp{font-size:11px;padding:4px 8px;background:rgba(245,158,11,.08);border-radius:4px;color:var(--yellow);margin-top:4px}
.news-item .news-content{font-size:11px;color:var(--text2);line-height:1.5;margin-top:4px}
/* Footer */
.footer{text-align:center;padding:20px;font-size:10px;color:var(--text3);border-top:1px solid var(--border);margin-top:16px}
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-state .icon{font-size:36px;margin-bottom:12px;opacity:.5}
/* Skeleton */
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--cardHover) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* Responsive */
@media(max-width:640px){
  .app{padding:12px}
  .detail-panel{padding:16px 12px 36px;border-radius:16px 16px 0 0}
  .stock-title{font-size:18px}
  .price-row .big-price{font-size:24px}
}
</style>
</head>
<body>
<div class="app">
<header>
  <h1>AI Tech Dashboard</h1>
  <div class="sub" id="updateTime">加载中...</div>
  <div class="stats">
    <div class="stat-item"><div class="stat-val" id="statTotal">-</div><div class="stat-label">AI标的</div></div>
    <div class="stat-item"><div class="stat-val" id="statPrice">-</div><div class="stat-label">有行情</div></div>
    <div class="stat-item"><div class="stat-val" id="statQ1">-</div><div class="stat-label">有Q1财报</div></div>
    <div class="stat-item"><div class="stat-val" id="statNews">-</div><div class="stat-label">有新闻</div></div>
  </div>
</header>
<div class="search-box">
  <span class="search-ic">🔍</span>
  <input type="text" id="searchInput" placeholder="搜索代码或名称... 如: 688205 / 旭创 / 寒武纪" autocomplete="off">
</div>
<div class="tags" id="tagFilters"></div>
<div class="status-bar">
  <span>共 <span class="count" id="stockCount">-</span> 只</span>
  <span id="viewInfo"></span>
</div>
<div class="stock-list" id="stockList"><div class="empty-state"><div class="icon">📡</div><p>加载中...</p></div></div>
<div class="footer">数据来源: 腾讯行情 + 同花顺财报 + 公开新闻 | 每日19:00自动更新 | 不构成投资建议</div>
</div>

<div class="detail-overlay" id="detailOverlay" style="display:none" onclick="if(event.target===this)closeDetail()">
  <div class="detail-panel" id="detailPanel"></div>
</div>

<script>
const CATS={all:'全部',compute:'🧠 算力',optical:'🔌 光通信',chip:'💾 芯片',robot:'🤖 机器人',app:'📱 AI应用',infra:'🏗️ 基础设施',other:'📦 其他'};
let allStocks=[],activeCat='all',searchQuery='';

async function init(){
  await loadData();
  renderTags();
  renderStockList();
  updateStats();
  document.getElementById('searchInput').addEventListener('input',debounce(onSearch,200));
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail()});
}

async function loadData(){
  try{
    const r=await fetch('/data/universe.json?t='+Date.now());
    if(!r.ok)throw new Error();
    const d=await r.json();
    allStocks=d.stocks||[];
    document.getElementById('updateTime').textContent='更新: '+(d.updated||'');
    updateStats();
  }catch(e){
    document.getElementById('updateTime').textContent='数据加载失败';
  }
}

function updateStats(){
  document.getElementById('statTotal').textContent=allStocks.length;
  document.getElementById('statPrice').textContent=allStocks.filter(s=>s.price>0).length;
  document.getElementById('statQ1').textContent=allStocks.filter(s=>s.q1_revenue>0).length;
  fetch('/data/news/_count').then(r=>r.text()).then(c=>{
    document.getElementById('statNews').textContent=c||'?';
  }).catch(()=>{});
}

function renderTags(){
  document.getElementById('tagFilters').innerHTML=Object.entries(CATS).map(([k,v])=>
    `<span class="tag${k===activeCat?' active':''}" data-cat="${k}" onclick="filterByCat('${k}')">${v}</span>`
  ).join('');
}

function renderStockList(){
  let f=allStocks;
  if(activeCat!=='all') f=f.filter(s=>s.category===activeCat);
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    f=f.filter(s=>s.name.toLowerCase().includes(q)||s.code.includes(q));
  }
  document.getElementById('stockCount').textContent=f.length;
  document.getElementById('viewInfo').textContent=activeCat!=='all'?'筛选: '+CATS[activeCat]:'';

  if(f.length===0){
    document.getElementById('stockList').innerHTML='<div class="empty-state"><div class="icon">🔍</div><p>无匹配结果</p></div>';
    return;
  }

  document.getElementById('stockList').innerHTML=f.map(s=>{
    const cc=(s.change_pct||0)>=0?'up':'down';
    const cs=(s.change_pct||0)>=0?'+':'';
    const ctags=(s.concepts||[]).slice(0,3).map(c=>{
      let cls='warn';
      if(c.verified===true)cls='ok';else if(c.verified===false)cls='no';
      return `<span class="concept-tag ${cls}">${c.verified===true?'✅':c.verified===false?'❌':'⚠️'}${c.name}</span>`;
    }).join('');
    const biz=s.core_business||'';
    const pe=s.pe?`PE ${s.pe.toFixed(0)}`:'';
    const mc=s.market_cap?`${(s.market_cap/1e8).toFixed(0)}亿`:'';
    return `<div class="stock-card" onclick="showDetail('${s.code}')">
      <div class="row1">
        <div><span class="name">${s.name}</span><span class="code">${s.code}</span>${s.category?`<span class="cat-badge">${CATS[s.category]||''}</span>`:''}</div>
        <div class="price-area"><div class="price">${s.price?s.price.toFixed(2):'--'}</div><div class="change ${cc}">${cs}${(s.change_pct||0).toFixed(2)}%</div></div>
      </div>
      ${ctags?`<div class="row2">${ctags}</div>`:''}
      <div class="row3">${biz?`🏭 ${biz}`:''} ${pe} ${mc}</div>
    </div>`;
  }).join('');
}

async function showDetail(code){
  const stock=allStocks.find(s=>s.code===code);
  if(!stock)return;

  let newsItems=[];
  try{
    const r=await fetch(`/data/news/${code}.json?t=${Date.now()}`);
    if(r.ok){const d=await r.json();newsItems=d.items||[];}
  }catch(e){}

  const cc=(stock.change_pct||0)>=0?'up':'down';
  const cs=(stock.change_pct||0)>=0?'+':'';

  // Concepts
  const ctags=(stock.concepts||[]).map(c=>{
    let i='⚠️',cls='warn';
    if(c.verified===true){i='✅';cls='ok'}else if(c.verified===false){i='❌';cls='no'}
    return `<span class="concept-tag ${cls}">${i} ${c.name}</span>`;
  }).join(' ');

  // Products with rich display
  const da=stock.deep_analysis||{};
  const prods=(da.products||[]).map(p=>{
    let cls='mass',icon='✅';
    if((p.status||'').includes('研发')){cls='rd';icon='🔬'}
    else if((p.status||'').includes('外购')){cls='ext';icon='❌'}
    else if((p.status||'').includes('成熟')){cls='mass';icon='✔️'}
    return `<div class="prod-item ${cls}">
      <div class="prod-icon">${icon}</div>
      <div class="prod-info">
        <div class="prod-name">${p.name}</div>
        <div class="prod-meta">状态: ${p.status||'--'}</div>
        <div class="prod-detail">${p.detail||''}</div>
      </div>
    </div>`;
  }).join('');

  // Supply chain
  const sc=da.supply_chain||{};
  const scHTML=sc.upstream?`
    <div class="sc-flow">
      <div class="sc-node up">上游<br>${sc.upstream}</div>
      <span class="sc-arrow">→</span>
      <div class="sc-node self">${stock.name}<br>${sc.position||''}</div>
      <span class="sc-arrow">→</span>
      <div class="sc-node down">下游<br>${sc.downstream}</div>
    </div>`:'';

  // Catalysts
  const cats=(da.catalysts||[]).map(c=>`<div class="cat-item">${c}</div>`).join('');
  const risks=(da.risks||[]).map(r=>`<div class="risk-item">${r}</div>`).join('');

  // News
  const newsHTML=newsItems.length>0?newsItems.map(n=>`
    <div class="news-item">
      <div class="news-title">${n.title}</div>
      <div class="news-meta">${n.date||''} · ${n.source||''}</div>
      ${n.interpretation?`<div class="news-interp">💡 ${n.interpretation}</div>`:''}
      ${n.content?`<div class="news-content">${n.content}</div>`:''}
    </div>`).join(''):'<div style="color:var(--text3);font-size:12px;text-align:center;padding:16px">暂无近期动态缓存</div>';

  // Q1 data
  const q1r=stock.q1_revenue!=null?`<div class="info-row"><span class="label">Q1营收</span><span class="val">${stock.q1_revenue?stock.q1_revenue.toFixed(2)+'亿':'--'}</span></div>`:'';
  const q1p=stock.q1_profit!=null?`<div class="info-row"><span class="label">Q1净利润</span><span class="val" style="color:${(stock.q1_profit||0)>=0?'var(--green)':'var(--red)'}">${stock.q1_profit?stock.q1_profit.toFixed(2)+'亿':'--'}</span></div>`:'';
  const q1gm=stock.q1_gross_margin?`<div class="info-row"><span class="label">毛利率</span><span class="val">${stock.q1_gross_margin.toFixed(1)}%</span></div>`:'';
  const ry=stock.q1_revenue_yoy!=null?`<div class="info-row"><span class="label">营收同比</span><span class="val" style="color:${(stock.q1_revenue_yoy||0)>=0?'var(--green)':'var(--red)'}">${stock.q1_revenue_yoy>0?'+':''}${stock.q1_revenue_yoy.toFixed(1)}%</span></div>`:'';

  document.getElementById('detailPanel').innerHTML=`
    <div class="close-row">
      <div>
        <div class="stock-title">${stock.name} <span style="font-size:13px;color:var(--text3)">${stock.code}</span></div>
        <div class="stock-sub">${stock.core_business||''}</div>
      </div>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="price-row">
      <div class="big-price">${stock.price?stock.price.toFixed(2):'--'}</div>
      <div class="big-chg ${cc}">${cs}${(stock.change_pct||0).toFixed(2)}%</div>
    </div>

    <div class="detail-section">
      <h3>📊 基本面</h3>
      <div class="info-row"><span class="label">市值</span><span class="val">${stock.market_cap?(stock.market_cap/1e8).toFixed(0)+'亿':'--'}</span></div>
      <div class="info-row"><span class="label">PE</span><span class="val">${stock.pe?stock.pe.toFixed(1):'--'}</span></div>
      <div class="info-row"><span class="label">核心业务</span><span class="val">${stock.core_business||'--'}</span></div>
      ${q1r}${q1p}${q1gm}${ry}
    </div>

    <div class="detail-section">
      <h3>🏷️ 概念校验</h3>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px">${ctags||'暂无'}</div>
      <div style="font-size:10px;color:var(--text3)">✅有实 ⚠️沾边 ❌无关</div>
    </div>

    ${prods?`
    <div class="detail-section">
      <h3>🔬 产品矩阵</h3>
      ${prods}
    </div>`:''}

    ${scHTML?`
    <div class="detail-section">
      <h3>📦 供应链</h3>
      ${scHTML}
    </div>`:''}

    ${cats?`
    <div class="detail-section">
      <h3>📈 上涨催化</h3>
      ${cats}
    </div>`:''}

    ${risks?`
    <div class="detail-section">
      <h3>⚠️ 风险</h3>
      ${risks}
    </div>`:''}

    ${da.key_question?`
    <div class="key-q">❓ ${da.key_question}</div>`:''}

    <div class="detail-section" style="margin-top:20px">
      <h3>📰 最新动态与解读</h3>
      ${newsHTML}
    </div>`;

  document.getElementById('detailOverlay').style.display='flex';
  document.body.style.overflow='hidden';
}

function closeDetail(){
  document.getElementById('detailOverlay').style.display='none';
  document.body.style.overflow='';
}
function filterByCat(cat){activeCat=cat;renderTags();renderStockList();}
function onSearch(){searchQuery=document.getElementById('searchInput').value.trim();renderStockList();}
function debounce(fn,d){let t;return function(...a){clearTimeout(t);t=setTimeout(()=>fn.apply(this,a),d)};}
init();
</script>
</body>
</html>
